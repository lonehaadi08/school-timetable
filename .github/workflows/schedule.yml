name: Auto-Update Timetable

on:
  schedule:
    # This weird code means "Every 20 minutes"
    - cron: '*/20 * * * *'
  workflow_dispatch: # This lets you click a "Run Now" button manually

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        run: python scripts/update_data.py

      - name: Commit and Push Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update timetable data"
          file_pattern: "public/data.json"