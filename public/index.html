<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-animation">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <div class="glass-container">
        <header class="app-header">
            <div class="header-top">
                <div class="brand">
                    <span class="icon">✨</span>
                    <h1>Timetable</h1>
                </div>
                <div class="status-badge" id="lastUpdated">Offline</div>
            </div>

            <div class="search-box">
                <input type="text" id="batchInput" placeholder="Search your batch..." autocomplete="off">
                <button id="clearSearch" class="hidden">✕</button>
            </div>

            <div class="nav-pills">
                <button id="btnDaily" class="pill active" onclick="switchView('daily')">Daily View</button>
                <button id="btnWeekly" class="pill" onclick="switchView('weekly')">Weekly Plan</button>
            </div>
        </header>

        <main id="resultsArea" class="content-scroll">
            <div class="welcome-msg">
                <h2>👋 Hello!</h2>
                <p>Start typing your batch code to see the magic.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
